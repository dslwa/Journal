spring.application.name=Trading_Journal

spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.hibernate.SQL=${LOGGING_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_BINDER:WARN}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

finnhub.api.key=${FINNHUB_API_KEY:}
fmp.api.key=${FMP_API_KEY:}

admin.username=${ADMIN_USERNAME:}

spring.mail.host=${SMTP_HOST:smtp.resend.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:resend}
spring.mail.password=${SMTP_PASSWORD:your_resend_api_key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

management.health.mail.enabled=false
management.endpoints.web.exposure.include=health

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB
