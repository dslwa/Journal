<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100" height="100" fill="url(#bg)" rx="20"/>

  <!-- Trend line -->
  <path d="M 15 75 L 35 55 L 55 65 L 85 25"
        stroke="#3b82f6"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        opacity="0.4"/>

  <!-- Candlestick 1 (Green/Bullish) -->
  <line x1="25" y1="45" x2="25" y2="65" stroke="#10b981" stroke-width="2"/>
  <rect x="20" y="50" width="10" height="12" fill="#10b981" rx="1"/>

  <!-- Candlestick 2 (Red/Bearish) -->
  <line x1="45" y1="35" x2="45" y2="60" stroke="#ef4444" stroke-width="2"/>
  <rect x="40" y="40" width="10" height="15" fill="#ef4444" rx="1"/>

  <!-- Candlestick 3 (Green/Bullish) -->
  <line x1="65" y1="30" x2="65" y2="55" stroke="#10b981" stroke-width="2"/>
  <rect x="60" y="38" width="10" height="14" fill="#10b981" rx="1"/>

  <!-- Candlestick 4 (Green/Bullish) -->
  <line x1="80" y1="20" x2="80" y2="40" stroke="#10b981" stroke-width="2"/>
  <rect x="75" y="25" width="10" height="12" fill="#10b981" rx="1"/>

  <!-- Accent line at bottom -->
  <rect x="0" y="95" width="100" height="5" fill="#22c55e" opacity="0.6"/>
</svg>
